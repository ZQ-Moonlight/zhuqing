<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
    <title id="title">祝庆 Zhu Qing social sharing card</title>
    <desc id="desc">A cinematic dark portfolio sharing card for Zhu Qing, UE Developer and Video Editor.</desc>
    <defs>
        <radialGradient id="cyanGlow" cx="18%" cy="18%" r="62%">
            <stop offset="0" stop-color="#00f0ff" stop-opacity="0.46" />
            <stop offset="0.38" stop-color="#005d68" stop-opacity="0.18" />
            <stop offset="1" stop-color="#050505" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="orangeGlow" cx="86%" cy="78%" r="56%">
            <stop offset="0" stop-color="#ff5e00" stop-opacity="0.5" />
            <stop offset="0.46" stop-color="#5a2104" stop-opacity="0.2" />
            <stop offset="1" stop-color="#050505" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#12151a" stop-opacity="0.82" />
            <stop offset="1" stop-color="#050505" stop-opacity="0.36" />
        </linearGradient>
        <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#ff5e00" />
            <stop offset="1" stop-color="#00f0ff" />
        </linearGradient>
        <pattern id="grain" width="6" height="6" patternUnits="userSpaceOnUse">
            <path d="M0 1H6M0 5H6" stroke="#ffffff" stroke-opacity="0.035" />
        </pattern>
    </defs>

    <rect width="1200" height="630" fill="#050505" />
    <rect width="1200" height="630" fill="url(#cyanGlow)" />
    <rect width="1200" height="630" fill="url(#orangeGlow)" />
    <rect width="1200" height="630" fill="url(#grain)" opacity="0.55" />

    <g opacity="0.42">
        <path d="M74 108H1126" stroke="#ffffff" stroke-opacity="0.12" />
        <path d="M74 522H1126" stroke="#ffffff" stroke-opacity="0.12" />
        <path d="M106 78V552" stroke="#ffffff" stroke-opacity="0.08" />
        <path d="M1094 78V552" stroke="#ffffff" stroke-opacity="0.08" />
    </g>

    <rect x="82" y="86" width="1036" height="458" rx="18" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.12" />
    <rect x="82" y="86" width="1036" height="4" fill="url(#accentLine)" />

    <g transform="translate(128 142)">
        <text x="0" y="0" fill="#ff7a1a" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="5">PORTFOLIO / UE DEVELOPMENT / POST-PRODUCTION</text>
        <text x="0" y="124" fill="#f5f5f7" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="86" font-weight="700">祝庆</text>
        <text x="4" y="180" fill="#f5f5f7" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="1">Zhu Qing</text>
        <rect x="4" y="220" width="360" height="2" fill="url(#accentLine)" />
        <text x="4" y="280" fill="#d7d7dc" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">UE Developer &amp; Video Editor</text>
        <text x="4" y="326" fill="#a8a8ae" font-family="'Noto Sans SC', Arial, sans-serif" font-size="24">影视后期 · MetaHuman · 虚拟制片 · 交互叙事</text>
    </g>

    <g transform="translate(786 156)">
        <circle cx="130" cy="130" r="120" fill="#0b1115" stroke="#ffffff" stroke-opacity="0.14" />
        <circle cx="88" cy="118" r="34" fill="none" stroke="#00f0ff" stroke-width="5" stroke-opacity="0.88" />
        <circle cx="170" cy="118" r="34" fill="none" stroke="#ff5e00" stroke-width="5" stroke-opacity="0.88" />
        <path d="M68 220C93 186 116 171 130 171C144 171 167 186 192 220" fill="none" stroke="#f5f5f7" stroke-width="6" stroke-linecap="round" opacity="0.84" />
        <path d="M130 34V226" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2" />
        <path d="M34 130H226" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2" />
        <text x="130" y="306" text-anchor="middle" fill="#a8a8ae" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">CINEMATIC TECH</text>
    </g>
</svg>
